<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Margin Notes — <!--MARGIN_DOC_NAME--></title>
<script>
// Theme init — runs before any paint so there is no light/dark flash, and on
// EVERY load so the data-theme baked into a shared file is always re-derived
// from this viewer's own storage/OS rather than inherited from the author.
(function () {
  try {
    var t = localStorage.getItem('mn-theme');
    if (t !== 'dark' && t !== 'light') {
      t = (window.matchMedia && matchMedia('(prefers-color-scheme: dark)').matches) ? 'dark' : 'light';
    }
    document.documentElement.setAttribute('data-theme', t);
  } catch (e) { document.documentElement.setAttribute('data-theme', 'light'); }
})();
</script>
<style>
* { box-sizing: border-box; }

html[data-theme="light"] {
  --desk: #eef1f7; --panel: #ffffff;
  --ink: #172033; --ink-2: #4d5b70; --ink-3: #768196;
  --line: #dce2ec; --line-2: #c4cedd;
  --field: #f6f8fc; --accent: #365dc9; --on-accent: #ffffff;
  --shadow:      0 16px 36px rgba(31, 43, 66, .10);
  --shadow-card: 0 4px 14px rgba(31, 43, 66, .08);
  --shadow-btn:  0 1px 2px rgba(31, 43, 66, .12);
  --hl-yellow: #fde68a; --hl-green: #bbf7d0; --hl-pink: #fbcfe8;
  --question: #b77908; --approved: #27855b; --needs-work: #c24f70;
}
html[data-theme="dark"] {
  --desk: #161a22; --panel: #202631;
  --ink: #e9edf5; --ink-2: #b9c2d0; --ink-3: #929daf;
  --line: #303846; --line-2: #465162;
  --field: #191f29; --accent: #7ba6ff; --on-accent: #13203a;
  --shadow:      0 16px 36px rgba(0, 0, 0, .28);
  --shadow-card: 0 4px 14px rgba(0, 0, 0, .22);
  --shadow-btn:  0 1px 2px rgba(0, 0, 0, .30);
  --hl-yellow: #6d5a12; --hl-green: #1c5636; --hl-pink: #6b2a50;
  --question: #f0c44d; --approved: #65c591; --needs-work: #f184a2;
}

:root { --rail: clamp(19rem, 25vw, 23rem); }

body {
  margin: 0; background: var(--desk); color: var(--ink);
  font: 16px/1.6 -apple-system, "Segoe UI", system-ui, sans-serif;
  transition: background-color .2s ease, color .2s ease;
}

/* --- header --- */
#margin-header {
  position: sticky; top: 0; z-index: 20;
  display: flex; gap: .6rem; align-items: center; flex-wrap: wrap;
  padding: .65rem clamp(1rem, 3vw, 2rem); background: var(--panel);
  border-bottom: 1px solid var(--line);
  box-shadow: 0 1px 0 rgba(20, 28, 43, .04);
}
#margin-header .grow { flex: 1 1 8rem; min-width: 0; }
.mn-title { font-weight: 650; color: var(--ink-2);
  overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

.mn-btn, .mn-save {
  font: inherit; font-size: .85rem; padding: .35rem .7rem;
  border: 1px solid var(--line-2); border-radius: 8px;
  background: var(--field); color: var(--ink); cursor: pointer;
  box-shadow: var(--shadow-btn); transition: border-color .12s ease, background-color .12s ease, transform .08s ease;
}
.mn-btn:active, .mn-save:active { transform: translate(2px, 2px); box-shadow: none; }
.mn-btn:hover, .mn-save:hover { border-color: var(--accent); }
.mn-save[data-state="dirty"] { color: var(--accent); font-weight: 600; }
.mn-save[data-state="saving"] { color: var(--ink-3); }
.mn-state { font-size: .78rem; color: var(--ink-3); white-space: nowrap; }
.mn-state[data-state="dirty"] { color: var(--accent); }
.mn-primary { background: var(--accent); border-color: var(--accent); color: var(--on-accent); }
.mn-primary:hover { background: var(--accent); border-color: var(--accent); filter: brightness(1.06); }

.mn-identity { display: inline-flex; }
.mn-chip {
  display: inline-flex; align-items: center; gap: .45rem;
  font: inherit; font-size: .85rem; padding: .3rem .6rem;
  border: 1px solid var(--line-2); border-radius: 999px;
  background: var(--field); color: var(--ink); cursor: pointer;
}
.mn-dot { width: 12px; height: 12px; border-radius: 50%; flex: none;
  background: var(--ink-3); box-shadow: inset 0 0 0 1px rgba(0,0,0,.18); }
.mn-name-input {
  font: inherit; font-size: .88rem; padding: .3rem .55rem;
  border: 1px solid var(--accent); border-radius: 999px;
  background: var(--field); color: var(--ink); width: 11rem; max-width: 50vw;
}
.mn-hr { display: inline-flex; align-items: center; gap: .35rem;
  font-size: .82rem; color: var(--ink-2); cursor: pointer; }

/* --- layout: centred reading column + anchored rail --- */
.layout {
  display: grid; grid-template-columns: minmax(0, 70ch) minmax(18rem, var(--rail));
  gap: clamp(1.5rem, 3vw, 3.5rem); justify-content: center; align-items: start;
  padding: clamp(1.25rem, 3vw, 2.5rem) clamp(1rem, 3vw, 2rem) 5rem;
}
#margin-doc {
  background: var(--panel); border: 1px solid var(--line); border-radius: 8px;
  box-shadow: var(--shadow); padding: clamp(1.6rem, 4vw, 3rem) clamp(1.25rem, 4vw, 3rem);
  min-width: 0;
  font: 17px/1.72 "Iowan Old Style", "Palatino Linotype", Palatino, Georgia, serif;
}
#margin-doc h1, #margin-doc h2, #margin-doc h3 {
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
  line-height: 1.18; letter-spacing: 0; color: var(--ink);
}
#margin-doc h1 { font-size: clamp(1.8rem, 3vw, 2.55rem); margin-top: 0; }
#margin-doc h2 { margin-top: 2.2em; }
#margin-doc pre { background: var(--field); border: 1px solid var(--line);
  border-radius: 8px; padding: .8rem; overflow: auto; }
#margin-doc code { font-family: ui-monospace, "SFMono-Regular", monospace; font-size: .92em; }
#margin-doc :not(pre) > code { background: var(--field); border: 1px solid var(--line);
  border-radius: 4px; padding: .05em .3em; }
#margin-doc a { color: var(--accent); }
#margin-doc blockquote { border-left: 3px solid var(--line-2); margin-left: 0;
  padding-left: 1rem; color: var(--ink-2); }
#margin-doc table { border-collapse: collapse; }
#margin-doc th, #margin-doc td { border: 1px solid var(--line); padding: .3rem .6rem; }

mark.mn-hl {
  color: inherit; cursor: pointer; border-radius: 2px; padding-bottom: 1px;
  text-decoration-line: underline; text-decoration-thickness: 2px;
  text-underline-offset: 2px;
}

#margin-rail { position: relative; min-height: 1px; }
#margin-rail.anchored .mn-card { position: absolute; left: 0; right: 0; }
#margin-rail:not(.anchored) .mn-card { margin-bottom: 1rem; }

.mn-empty { color: var(--ink-3); font-size: .9rem; padding: 1rem .2rem; }

/* --- note card --- */
.mn-card {
  --card-accent: var(--accent);
  background: var(--panel); border: 1px solid var(--line); border-left: 3px solid var(--card-accent);
  border-radius: 8px; box-shadow: var(--shadow-card); padding: .8rem .9rem .85rem;
  transition: top .12s ease, border-color .12s ease, box-shadow .12s ease;
}
.mn-card[data-kind="comment"] { --card-accent: var(--accent); }
.mn-card[data-intent="question"] { --card-accent: var(--question); }
.mn-card[data-intent="approved"] { --card-accent: var(--approved); }
.mn-card[data-intent="needs-work"] { --card-accent: var(--needs-work); }
.mn-card[data-kind="underline"], .mn-card[data-kind="strike"] { --card-accent: var(--ink-3); }
.mn-card.resolved { opacity: .6; }
.mn-card.unanchored { border-style: dashed; }
.mn-card.changed { border-style: dotted; }
.mn-card.changed .mn-badge { background: var(--accent); }
.mn-card.draft { border-color: var(--accent); }
.mn-card.draft .mn-badge { background: var(--accent); }

.mn-card-head { display: flex; align-items: center; gap: .45rem; margin-bottom: .7rem; min-height: 1.25rem; }
.mn-id { font: 650 .68rem/1 -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
  color: var(--ink-3); letter-spacing: .08em; text-transform: uppercase; }
.mn-badge { font: .68rem/1 ui-monospace, monospace; color: #fff;
  background: var(--ink-3); border-radius: 999px; padding: .2rem .42rem; }
.mn-icon { background: none; border: 1px solid transparent; border-radius: 6px;
  cursor: pointer; color: var(--ink-3); padding: .22rem .35rem; font-size: .75rem;
  line-height: 1; }
.mn-icon:hover { color: var(--ink); background: var(--field); border-color: var(--line); }
.mn-quote { color: var(--ink-2); background: var(--field); border-left: 2px solid var(--card-accent);
  border-radius: 0 5px 5px 0; padding: .45rem .6rem; margin: 0 0 .8rem;
  font: .83rem/1.45 "Iowan Old Style", "Palatino Linotype", Palatino, Georgia, serif; }
.mn-quote-kicker { display: block; margin-bottom: .18rem; color: var(--ink-3);
  font: 650 .63rem/1 -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
  letter-spacing: .08em; text-transform: uppercase; }
.mn-card.mark { padding: .7rem .8rem; }
.mn-card.mark .mn-quote { margin: 0; }
.mn-kind { width: 12px; height: 12px; border-radius: 3px; flex: none;
  border: 1px solid var(--line-2); }
.mn-card-foot { display: flex; justify-content: flex-end; gap: .4rem;
  margin-top: .8rem; padding-top: .65rem; border-top: 1px solid var(--line); }
.mn-resolve-action { color: var(--ink-2); font-size: .78rem; box-shadow: none; }
.mn-thread-toggle { margin-left: 36px; align-self: flex-start; }

/* conversation: continuous connector line behind the avatars */
.mn-conv { position: relative; display: flex; flex-direction: column; gap: .85rem; }
.mn-conv::before { content: ""; position: absolute; left: 14px; top: 14px; bottom: 14px;
  width: 2px; background: var(--line-2); transform: translateX(-50%); z-index: 0; }
.mn-msg, .mn-composer { display: grid; grid-template-columns: 28px 1fr; gap: .55rem;
  align-items: start; position: relative; z-index: 1; }
.mn-avatar { width: 28px; height: 28px; border-radius: 50%; flex: none;
  display: grid; place-items: center; color: #fff;
  font: 600 .75rem/1 ui-monospace, monospace;
  box-shadow: 0 0 0 2px var(--panel); }
.mn-meta { font: .72rem/1.3 ui-monospace, monospace; color: var(--ink-3); margin-bottom: .22rem; }
.mn-author { color: var(--ink-2); font-weight: 600; }
.mn-text { white-space: pre-wrap; word-break: break-word; font-size: .92rem; line-height: 1.5; }
.mn-msg textarea, .mn-reply {
  width: 100%; font: inherit; font-size: .92rem; color: var(--ink);
  background: var(--field); border: 1px solid var(--line-2); border-radius: 7px;
  padding: .5rem .6rem;
}
.mn-msg textarea { resize: vertical; }
.mn-msg.draft textarea { border-color: var(--accent); }
.mn-reply { resize: none; }
.mn-msg-actions { display: flex; justify-content: flex-end; margin-top: .35rem; }
.mn-replybox { display: flex; gap: .4rem; align-items: stretch; }
.mn-replybox .mn-reply { flex: 1; min-width: 0; }
.mn-replybox .mn-btn { white-space: nowrap; }

/* selection toolbar */
.mn-tools, .mn-mark-tools { position: absolute; z-index: 30; transform: translateY(-120%);
  display: flex; gap: .25rem; align-items: center; padding: .25rem .35rem;
  background: var(--panel); border: 1px solid var(--line-2); border-radius: 10px;
  box-shadow: var(--shadow-btn); }
.mn-mark-tools { z-index: 31; transform: translateY(-135%); }
.mn-mark-label { font: .72rem/1 ui-monospace, monospace; color: var(--ink-3);
  padding: 0 .25rem; white-space: nowrap; }
.mn-tool { font: inherit; font-size: .82rem; line-height: 1; cursor: pointer;
  border: 1px solid transparent; border-radius: 6px; padding: .3rem .45rem;
  background: none; color: var(--ink); }
.mn-tool:hover { border-color: var(--line-2); background: var(--field); }
.mn-tool-dot { width: 16px; height: 16px; padding: 0; border-radius: 50%;
  border: 1px solid var(--line-2); }
mark.mn-hl.hl-yellow { background: var(--hl-yellow); text-decoration: none; }
mark.mn-hl.hl-green  { background: var(--hl-green);  text-decoration: none; }
mark.mn-hl.hl-pink   { background: var(--hl-pink);   text-decoration: none; }
mark.mn-hl.hl-under  { background: transparent; }
mark.mn-hl.hl-strike { background: transparent;
  text-decoration-line: line-through; }

/* first-save explainer — an inline panel, never a browser modal */
.mn-explainer { position: fixed; top: 60px; right: 1.5rem; z-index: 50;
  max-width: 340px; background: var(--panel); border: 1px solid var(--line-2);
  border-radius: 12px; box-shadow: var(--shadow); padding: 1rem 1.1rem;
  font-size: .9rem; color: var(--ink-2); }
.mn-explainer h3 { margin: 0 0 .4rem; font-size: .95rem; color: var(--ink); }
.mn-explainer code { font-family: ui-monospace, monospace; color: var(--ink);
  background: var(--field); border: 1px solid var(--line); border-radius: 4px; padding: .05em .3em; }
.mn-explainer .row { display: flex; gap: .5rem; margin-top: .8rem; }

/* post-delete undo toast — replaces the native confirm */
.mn-undo { position: fixed; left: 50%; bottom: 1.2rem; transform: translateX(-50%);
  z-index: 50; display: flex; gap: .7rem; align-items: center;
  background: var(--panel); border: 1px solid var(--line-2); border-radius: 10px;
  box-shadow: var(--shadow); padding: .55rem .9rem; font-size: .88rem; }

:focus-visible { outline: 2px solid var(--accent); outline-offset: 2px; }
[hidden] { display: none !important; }

@media (max-width: 880px) {
  .layout { grid-template-columns: 1fr; }
  #margin-rail { border-top: 1px solid var(--line); padding-top: 1rem; }
  .mn-explainer { left: 1rem; right: 1rem; max-width: none; }
}
@media (prefers-reduced-motion: reduce) {
  * { transition: none !important; }
}
/* Boot-time alert when the baked-in notes ledger is unreadable. Fixed red works
   in both themes: #fff on #b91c1c is ~5.9:1, clearing WCAG AA. */
.mn-banner { padding: .6rem 1rem; background: #b91c1c; color: #fff; font-size: .85rem; line-height: 1.4; text-align: center; }
/* save arming bar — the one-time gesture that lets the file write itself */
.mn-armbar { display: flex; gap: .6rem; align-items: center; justify-content: center;
  flex-wrap: wrap; padding: .45rem 1rem; font-size: .82rem; color: var(--ink-2);
  background: var(--field); border-bottom: 1px solid var(--line); }
.mn-armbar code { font-family: ui-monospace, monospace; color: var(--ink);
  background: var(--panel); border: 1px solid var(--line); border-radius: 4px;
  padding: .05em .3em; }
.mn-armbar .mn-btn { font-size: .78rem; padding: .2rem .55rem; }
.mn-armbar.mn-drag { outline: 2px dashed var(--accent); outline-offset: -3px; }
</style>
</head>
<body>
<header id="margin-header"></header>
<main id="margin-doc"></main>
<aside id="margin-rail" aria-label="Margin notes"></aside>

<script id="margin-source" type="text/plain"></script>
<script id="margin-notes" type="text/plain"></script>

<script>/*MARGIN_MARKED*/</script>
<script>/*MARGIN_CORE*/</script>
<script>
(function () {
  'use strict';
  // Capture the pristine page HTML before any DOM mutation. Save reconstructs
  // the file from this, swapping only the notes block — never from the live,
  // mutated DOM (which would double-render on reopen). The only "live" value it
  // carries is data-theme on <html>, which the head init script re-derives on
  // every reopen, so it is never effectively baked into the shared ledger.
  var PRISTINE = '<!doctype html>\n' + document.documentElement.outerHTML;
  var DOC_NAME = document.title.replace('Margin Notes — ', '') || 'doc';
  var SAVE_NAME = DOC_NAME.replace(/\.md$/, '') + '-view.html';
  var LS_KEY = 'mn-notes:' + DOC_NAME;
  var HANDLE_KEY = 'handle:' + DOC_NAME;

  var doc = document.getElementById('margin-doc');
  var rail = document.getElementById('margin-rail');
  var header = document.getElementById('margin-header');

  function b64decode(b64) {
    return new TextDecoder().decode(Uint8Array.from(atob(b64), function (c) { return c.charCodeAt(0); }));
  }
  function b64encode(str) {
    return btoa(String.fromCharCode.apply(null, new TextEncoder().encode(str)));
  }

  var MARK_COLORS = ['yellow', 'green', 'pink'];
  var MARK_INTENTS = {
    yellow: { tag: 'question', label: 'Question' },
    green: { tag: 'approved', label: 'Looks good' },
    pink: { tag: 'needs-work', label: 'Needs work' }
  };
  function markIntentForColor(color) {
    return MARK_INTENTS[color] || { tag: 'highlight', label: 'Highlight' };
  }
  function markLabel(n) {
    if (n.kind === 'highlight') return markIntentForColor(n.color || 'yellow').label;
    if (n.kind === 'underline') return 'Underline';
    if (n.kind === 'strike') return 'Strike';
    return 'Comment';
  }
  function normalizeMarkSemantics(n) {
    if (n.kind !== 'highlight') return;
    if (!n.color) n.color = 'yellow';
    n.intent = markIntentForColor(n.color).tag;
  }

  // --- state ---
  // Same failure class as the notes block below: a corrupt source payload would
  // throw in b64decode and crash the boot before anything paints. Degrade to an
  // empty document (the rail and notes can still work) and flag it for the banner.
  var sourceMd = '', sourceCorrupt = false;
  try { sourceMd = b64decode(document.getElementById('margin-source').textContent.trim()); }
  catch (e) { sourceCorrupt = true; }
  var notesRaw = document.getElementById('margin-notes').textContent.trim();
  // A malformed baked-in ledger (a truncated write, a botched hand-edit) must not
  // take the whole viewer down with it: parsing it is the first thing the boot
  // does, so an uncaught throw here leaves the document, rail, and save handler
  // unrendered. Boot with an empty set so the document still reads, and flag the
  // failure so save() refuses to silently overwrite the unreadable notes on disk.
  var state, notesCorrupt = false;
  try {
    state = notesRaw ? JSON.parse(b64decode(notesRaw)) : { schemaVersion: 1, notes: [] };
  } catch (e) {
    state = { schemaVersion: 1, notes: [] };
    notesCorrupt = true;
  }
  // schema-v2 normalization: applied wherever state is assigned (baked-in
  // load below, and the localStorage hydration further down), so every path
  // into state leaves every note carrying a kind and schemaVersion at 2 --
  // a stale pre-upgrade autosave must not be able to reintroduce v1 shape.
  function normalizeState() {
    // build-view carries a present-but-malformed notes payload through verbatim
    // (it repairs nothing it cannot parse), so a non-array notes can reach here
    // intact. Treat it like an undecodable ledger: reset and flag, so the banner
    // and the save-time overwrite guard fire, rather than the forEach below
    // throwing and aborting boot to a blank page, or the notes silently vanishing.
    if (state.notes && !Array.isArray(state.notes)) { state.notes = []; notesCorrupt = true; }
    if (!state.notes) state.notes = [];
    state.schemaVersion = 2;
    // v1 ledgers predate kinds; every reader from here on can rely on n.kind.
    state.notes.forEach(function (n) {
      if (!n.kind) n.kind = 'comment';
      normalizeMarkSemantics(n);
    });
  }
  normalizeState();

  // Hydrate from the localStorage autosave only when it is strictly newer than
  // the notes baked into this file. A bare "cache always wins" would let a
  // reviewer's stale autosave clobber an author-regenerated ledger (silent
  // cross-round data loss); comparing savedAt keeps regeneration authoritative
  // while still recovering unsaved local work after a crash or closed tab.
  function savedAtMs(o) { var t = o && o.savedAt ? Date.parse(o.savedAt) : 0; return isNaN(t) ? 0 : t; }
  // A cache adopted here is unsaved-to-file work recovered from a crash or a
  // closed tab; recording that lets the save flags below reflect it once they
  // are declared (they init further down, so setting them here would be clobbered).
  var recoveredNewer = false;
  try {
    var cached = localStorage.getItem(LS_KEY);
    // A newer autosave is a genuine recovery of the notes, so adopting it also
    // clears the corrupt flag: writing the recovered set back to disk is safe.
    if (cached) { var c = JSON.parse(cached); if (c && c.notes && savedAtMs(c) > savedAtMs(state)) { state = c; notesCorrupt = false; normalizeState(); recoveredNewer = true; } }
  } catch (e) {}

  var problems = [];
  if (sourceCorrupt) problems.push('The document text in this file could not be read, so it is not shown.');
  if (notesCorrupt) problems.push('The saved notes could not be read, so they are not shown; saving asks before overwriting them.');
  if (problems.length) {
    var banner = document.createElement('div'); banner.className = 'mn-banner'; banner.setAttribute('role', 'alert');
    banner.textContent = problems.join(' ');
    document.body.insertBefore(banner, document.body.firstChild);
  }

  var seq = state.notes.reduce(function (m, n) {
    var k = parseInt(String(n.id).replace(/\D/g, ''), 10); return isNaN(k) ? m : Math.max(m, k);
  }, 0);

  // Deterministic author -> hue so each reviewer's cards, avatars and highlight
  // share one colour without any manual picking. Derived at render time, so
  // notes carried in from other reviewers colour by their author.
  function hueFor(author) {
    var h = 0, s = String(author || '');
    for (var i = 0; i < s.length; i++) h = (h * 31 + s.charCodeAt(i)) % 360;
    return h;
  }
  function colorFor(author) { return 'hsl(' + hueFor(author) + ', 62%, 55%)'; }
  function tintFor(author) { return 'hsla(' + hueFor(author) + ', 62%, 55%, .16)'; }
  function monogram(author) { var s = String(author || '?').trim(); return (s.charAt(0) || '?').toUpperCase(); }

  function relTime(iso) {
    var t = Date.parse(iso); if (isNaN(t)) return '';
    var s = Math.floor((Date.now() - t) / 1000); if (s < 0) s = 0;
    if (s < 45) return 'just now';
    var m = Math.floor(s / 60); if (m < 60) return m + 'm ago';
    var h = Math.floor(m / 60); if (h < 24) return h + 'h ago';
    var d = Math.floor(h / 24); if (d < 7) return d + 'd ago';
    return new Date(t).toLocaleDateString();
  }

  // --- identity (no native prompt) ---
  var me = '';
  try { me = localStorage.getItem('mn-reviewer') || ''; } catch (e) {}
  var idWrap, themeBtn, saveBtn, stateChip;

  function currentAuthor() { return me || 'Reviewer'; }
  function isMine(author) { return author === me || (!me && author === 'Reviewer'); }
  function adoptFallbackAuthor(name) {
    state.notes.forEach(function (n) {
      if (n.author === 'Reviewer') n.author = name;
      (n.thread || []).forEach(function (entry) { if (entry.author === 'Reviewer') entry.author = name; });
    });
  }
  function setIdentity(name) {
    name = (name || '').trim();
    if (!name) return false;
    if (!me) adoptFallbackAuthor(name);
    me = name;
    try { localStorage.setItem('mn-reviewer', me); } catch (e) {}

  // Anchor-aligned placement: each card floats to its highlight's vertical

  var undoToast = null, undoTimer = 0;
  function showUndoToast(note, index) {
    if (undoToast) { undoToast.remove(); clearTimeout(undoTimer); }
    var t = document.createElement('div'); t.className = 'mn-undo'; undoToast = t;
    t.setAttribute('role', 'status');
    var label = document.createElement('span');
    label.textContent = itemLabel(note) + ' deleted';
    var undo = document.createElement('button'); undo.className = 'mn-btn'; undo.textContent = 'Undo';
    undo.addEventListener('click', function () {
      state.notes.splice(Math.min(index, state.notes.length), 0, note);
      paintHighlights(); renderRail(); markDirty();
      t.remove(); undoToast = null; clearTimeout(undoTimer);
    });
    t.appendChild(label); t.appendChild(undo);
    document.body.appendChild(t);
    undoTimer = setTimeout(function () { t.remove(); undoToast = null; }, 6000);
  }

  window.MN = { state: state, paintHighlights: paintHighlights, renderRail: renderRail,
    isDirty: function () { return dirty; }, setClean: function () { dirty = false; }, me: function () { return me; } };

  // --- build header ---
  idWrap = document.createElement('div'); idWrap.className = 'mn-identity';
  var title = document.createElement('span'); title.className = 'mn-title grow'; title.textContent = DOC_NAME;
  saveBtn = document.createElement('button'); saveBtn.className = 'mn-save';
  stateChip = document.createElement('span');
  stateChip.className = 'mn-state'; stateChip.setAttribute('aria-live', 'polite');
  themeBtn = document.createElement('button'); themeBtn.className = 'mn-btn';
  var hr = document.createElement('label'); hr.className = 'mn-hr';
  var cb = document.createElement('input'); cb.type = 'checkbox';
  cb.addEventListener('change', function () { hideResolved = cb.checked; renderRail(); });
  hr.appendChild(cb); hr.appendChild(document.createTextNode('hide resolved'));

  header.appendChild(idWrap);
  header.appendChild(title);
  header.appendChild(saveBtn);
  header.appendChild(stateChip);
  header.appendChild(themeBtn);
  header.appendChild(hr);

  renderIdentity();

  // --- theme toggle ---
  function currentTheme() { return document.documentElement.getAttribute('data-theme') || 'light'; }
  function applyThemeBtn() {
    var t = currentTheme();
    themeBtn.textContent = t === 'dark' ? '☀ Light' : '☾ Dark';
    themeBtn.setAttribute('aria-label', 'Switch to ' + (t === 'dark' ? 'light' : 'dark') + ' theme');
  }
  themeBtn.addEventListener('click', function () {
    var next = currentTheme() === 'dark' ? 'light' : 'dark';
    document.documentElement.setAttribute('data-theme', next);
    try { localStorage.setItem('mn-theme', next); } catch (e) {}
    applyThemeBtn();
  });
  applyThemeBtn();

  // initial paint
  paintHighlights(); renderRail();

  doc.addEventListener('click', function (e) {
    var mk = e.target.closest && e.target.closest('mark.mn-hl');
    if (!mk) { hideMarkTools(); return; }
    e.preventDefault();
    showMarkTools(mk);
  });
  doc.addEventListener('keydown', function (e) {
    var mk = e.target.closest && e.target.closest('mark.mn-hl');
    if (!mk || (e.key !== 'Enter' && e.key !== ' ')) return;
    e.preventDefault();
    showMarkTools(mk);
  });

  // --- save subsystem ---
  function serialize() { return b64encode(JSON.stringify(state)); }

  function autosave() {
    try {
      state.savedAt = new Date().toISOString();
      localStorage.setItem(LS_KEY, JSON.stringify(state));
      autosaved = true;
    } catch (e) {
      autosaved = false;
    }
    // Refresh the chip in place: private-browsing/quota-exceeded setItem
    // failures must flip "Safe on this Mac" back to "Not saved" even though
    // the save state itself is still just "dirty".
    if (saveBtn.dataset.state === 'dirty') setSaveState('dirty');
  }
  document.addEventListener('mn-dirty', autosave);

  function setSaveState(s) {
    saveBtn.dataset.state = s; stateChip.dataset.state = s;
    saveBtn.textContent = s === 'saving' ? 'Saving…' : 'Save';
    // The wording carries the handoff semantics: localStorage protects THIS
    // machine only once the autosave write has actually landed; only the
    // file write travels with the document.
    stateChip.textContent =
      s === 'saving' ? 'Saving…'
      : s === 'saved' ? 'In file'
      : autosaved ? 'Safe on this Mac — not yet in the file'
      : 'Not saved';
    saveBtn.setAttribute('aria-label', s === 'dirty' ? 'Save (unsaved changes)' : (s === 'saving' ? 'Saving' : 'Saved'));
  }
  document.addEventListener('mn-dirty', function () { if (saveBtn.dataset.state !== 'saving') setSaveState('dirty'); });

  // --- IndexedDB handle persistence (self-degrading) ---
  function idbOpen() {
    return new Promise(function (res, rej) {
      var r = indexedDB.open('mn-handles', 1);
      r.onupgradeneeded = function () { r.result.createObjectStore('handles'); };
      r.onsuccess = function () { res(r.result); };
      r.onerror = function () { rej(r.error); };
    });
  }
  function idbGet(key) {
    return idbOpen().then(function (db) { return new Promise(function (res, rej) {
      var q = db.transaction('handles', 'readonly').objectStore('handles').get(key);
      q.onsuccess = function () { res(q.result); }; q.onerror = function () { rej(q.error); };
    }); });
  }
  function idbSet(key, val) {
    return idbOpen().then(function (db) { return new Promise(function (res, rej) {
      var tx = db.transaction('handles', 'readwrite'); tx.objectStore('handles').put(val, key);
      tx.oncomplete = function () { res(); }; tx.onerror = function () { rej(tx.error); };
    }); });
  }
  function getStoredHandle() { return idbGet(HANDLE_KEY).catch(function () { return null; }); }
  function storeHandle(h) { return idbSet(HANDLE_KEY, h).catch(function () {}); }
  function verifyPermission(handle) {
    var opts = { mode: 'readwrite' };
    return Promise.resolve()
      .then(function () { return handle.queryPermission ? handle.queryPermission(opts) : 'granted'; })
      .then(function (p) { return p === 'granted' ? true : (handle.requestPermission ? handle.requestPermission(opts) : 'denied'); })
      .then(function (p) { return p === true || p === 'granted'; })
      .catch(function () { return false; });
  }

  // --- arming: acquiring a writable handle to this very file ---
  var armBar = null;
  function ownPath() {
    try { return decodeURIComponent(location.pathname); } catch (e) { return location.pathname; }
  }
  function removeArmBar() { if (armBar) { armBar.remove(); armBar = null; } }
  function armNotice(msg) {
    if (!armBar) showArmBar();
    if (!armBar) return; // showArmBar declined (no FSA, or not file:) — nothing to say
    armBar.firstChild.textContent = msg;
  }
  async function armWithHandle(handle) {
    if (!handle) return false;
    if (handle.name !== SAVE_NAME) {
      armNotice('That is a different file (' + handle.name + '). Drop ' + SAVE_NAME + '.');
      return false;
    }
    if (!(await verifyPermission(handle))) {
      armNotice('Write permission was not granted.');
      return false;
    }
    fileHandle = handle;
    await storeHandle(handle);
    removeArmBar();
    return true;
  }
  async function pickOwnFile() {
    // Open-picker, not save-picker: selecting an existing file this way skips
    // the OS "Replace?" confirm that the save-picker adds.
    var opts = {
      id: 'mn-view', types: [{ description: 'HTML', accept: { 'text/html': ['.html'] } }]
    };
    // The picker cannot be aimed at an arbitrary path (FSA privacy wall), but
    // startIn accepts a stored handle — the picker then opens in the file's
    // own folder — or a well-known directory name guessed from the path. The
    // id's remembered directory still wins whenever the browser has one, so
    // this only steers picks that would otherwise land in the default folder.
    var stored = await getStoredHandle();
    if (stored) {
      opts.startIn = stored;
    } else {
      var wk = decodeURIComponent(location.pathname).match(/^\/Users\/[^/]+\/(Downloads|Desktop|Documents)\//);
      if (wk) opts.startIn = wk[1].toLowerCase();
    }
    var handles = await showOpenFilePicker(opts);
    return armWithHandle(handles && handles[0]);
  }
  function showArmBar() {
    if (armBar || !window.showOpenFilePicker || location.protocol !== 'file:') return;
    armBar = document.createElement('div'); armBar.className = 'mn-armbar';
    var msg = document.createElement('span');
    msg.appendChild(document.createTextNode('To let this file save itself, drag it from Finder onto this window — it lives at '));
    var c = document.createElement('code'); c.textContent = ownPath();
    msg.appendChild(c); msg.appendChild(document.createTextNode(' — or '));
    armBar.appendChild(msg);
    var pick = document.createElement('button'); pick.className = 'mn-btn';
    pick.textContent = 'choose it once';
    pick.addEventListener('click', function () { pickOwnFile().catch(function () {}); });
    var dismiss = document.createElement('button'); dismiss.className = 'mn-icon';
    dismiss.textContent = '×'; dismiss.setAttribute('aria-label', 'Dismiss');
    dismiss.addEventListener('click', removeArmBar);
    armBar.appendChild(pick); armBar.appendChild(dismiss);
    // Above the sticky header, same slot the corrupt-data banner uses.
    document.body.insertBefore(armBar, header);
  }
  window.addEventListener('dragover', function (e) {
    e.preventDefault();
    if (armBar) armBar.classList.add('mn-drag');
  });
  window.addEventListener('dragleave', function () {
    if (armBar) armBar.classList.remove('mn-drag');
  });
  window.addEventListener('drop', function (e) {
    e.preventDefault();
    if (armBar) armBar.classList.remove('mn-drag');
    var item = e.dataTransfer && e.dataTransfer.items && e.dataTransfer.items[0];
    if (!item || item.kind !== 'file' || !item.getAsFileSystemHandle) return;
    item.getAsFileSystemHandle().then(armWithHandle).catch(function () {});
  });
  // Offer arming up front, not at the first save: silently reuse a stored
  // grant when the browser kept it, otherwise show the bar.
  (function () {
    if (!window.showOpenFilePicker) return;
    getStoredHandle().then(function (stored) {
      if (!stored) { showArmBar(); return; }
      Promise.resolve()
        .then(function () { return stored.queryPermission ? stored.queryPermission({ mode: 'readwrite' }) : 'prompt'; })
        .then(function (p) {
          if (p === 'granted') { fileHandle = stored; }
          else { showArmBar(); }
        })
        .catch(showArmBar);
    });
  })();

  // The first save names the exact file to choose, once. The Continue button is
  // itself the user gesture that opens the OS picker (so activation survives).
  var firstSaveExplained = false;
  function showFirstSaveExplainer() {
    return new Promise(function (resolve, reject) {
      var panel = document.createElement('div'); panel.className = 'mn-explainer';
      var h = document.createElement('h3'); h.textContent = 'Save this review once';
      var p = document.createElement('p'); p.style.margin = '0';
      p.appendChild(document.createTextNode('Your browser will ask which file to write. Pick '));
      var codeEl = document.createElement('code'); codeEl.textContent = ownPath();
      p.appendChild(codeEl);
      p.appendChild(document.createTextNode(' — the file you are reading right now. After this once, saving is a single click.'));
      var row = document.createElement('div'); row.className = 'row';
      var ok = document.createElement('button'); ok.className = 'mn-save'; ok.textContent = 'Choose file & save';
      var cancel = document.createElement('button'); cancel.className = 'mn-btn'; cancel.textContent = 'Not now';
      function cleanup() { panel.remove(); }
      ok.addEventListener('click', function () { cleanup(); resolve(); });
      cancel.addEventListener('click', function () { cleanup(); reject({ name: 'AbortError' }); });
      row.appendChild(ok); row.appendChild(cancel);
      panel.appendChild(h); panel.appendChild(p); panel.appendChild(row);
      document.body.appendChild(panel); ok.focus();
    });
  }

  function showOverwritePanel() {
    return new Promise(function (resolve, reject) {
      var panel = document.createElement('div'); panel.className = 'mn-explainer';
      panel.setAttribute('role', 'alertdialog');
      var h = document.createElement('h3'); h.textContent = 'Overwrite unreadable notes?';
      var p = document.createElement('p'); p.style.margin = '0';
      p.textContent = 'The notes already saved in this file could not be read and are not shown here. Saving writes the current notes over them.';
      var row = document.createElement('div'); row.className = 'row';
      var ok = document.createElement('button'); ok.className = 'mn-save'; ok.textContent = 'Overwrite';
      var cancel = document.createElement('button'); cancel.className = 'mn-btn'; cancel.textContent = 'Cancel';
      ok.addEventListener('click', function () { panel.remove(); resolve(); });
      cancel.addEventListener('click', function () { panel.remove(); reject({ name: 'AbortError' }); });
      row.appendChild(ok); row.appendChild(cancel);
      panel.appendChild(h); panel.appendChild(p); panel.appendChild(row);
      document.body.appendChild(panel); cancel.focus();
    });
  }

  var fileHandle = null;
  function downloadFallback(output) {
    var blob = new Blob([output], { type: 'text/html' });
    var a = document.createElement('a'); a.href = URL.createObjectURL(blob);
    a.download = SAVE_NAME; a.click(); URL.revokeObjectURL(a.href);
    window.MN.setClean(); setSaveState('saved'); notesCorrupt = false;
  }

  // Both panels above are non-blocking (Promise-based, not native confirm()), so
  // without this flag a double-click or Save-click-plus-Cmd+S while one is open
  // would invoke save() twice concurrently, stacking panels and racing the write.
  var saveBusy = false;
  async function save() {
    if (saveBusy) return;
    saveBusy = true;
    try {
      // The on-disk ledger could not be parsed at boot, so this state does not hold
      // those notes; writing now replaces the unreadable-but-present notes with the
      // current set. Confirm before that clobber so the original stays recoverable.
      if (notesCorrupt) {
        try { await showOverwritePanel(); }
        catch (e) { setSaveState(window.MN.isDirty() ? 'dirty' : 'saved'); return; }
      }
      state.savedAt = new Date().toISOString();
      var output = MarginCore.reconstructView(PRISTINE, serialize());
      try { localStorage.setItem(LS_KEY, JSON.stringify(state)); } catch (e) {}

      if (window.showOpenFilePicker) {
        setSaveState('saving');
        try {
          if (!fileHandle) {
            var stored = await getStoredHandle();
            if (stored && await verifyPermission(stored) && stored.name === SAVE_NAME) fileHandle = stored;
          }
          if (!fileHandle) {
            if (!firstSaveExplained) { firstSaveExplained = true; await showFirstSaveExplainer(); }
            if (!(await pickOwnFile())) throw { name: 'AbortError' };
          }
          var w = await fileHandle.createWritable(); await w.write(output); await w.close();
          // The file on disk now holds a readable ledger, so drop the corrupt flag:
          // later saves this session must not keep re-firing the overwrite confirm.
          notesCorrupt = false; window.MN.setClean(); setSaveState('saved'); return;
        } catch (e) {
          if (e && e.name === 'AbortError') { setSaveState(window.MN.isDirty() ? 'dirty' : 'saved'); return; }
          fileHandle = null;   // grant lost or write failed — fall through to download
        }
      }
      downloadFallback(output);
    } finally {
      saveBusy = false;
    }
  }
  saveBtn.addEventListener('click', save);

  window.addEventListener('keydown', function (e) {
    if ((e.metaKey || e.ctrlKey) && e.key.toLowerCase() === 's') { e.preventDefault(); save(); }
  });

  // Selection-scoped keys: only with a live selection in the document and
  // focus outside any editing surface, so typing in threads is never hijacked.
  window.addEventListener('keydown', function (e) {
    if (e.metaKey || e.ctrlKey || e.altKey) return;
    if (e.key === 'Escape') { hideTools(); hideMarkTools(); return; }
    var t = e.target;
    if (t && t.closest && t.closest('textarea, input, [contenteditable]')) return;
    var sel = document.getSelection();
    if (!sel || sel.isCollapsed || !doc.contains(sel.anchorNode)) return;
    var k = e.key.toLowerCase();
    if (k !== 'h' && k !== 'u' && k !== 's' && k !== 'c') return;
    e.preventDefault();
    var anchor = anchorFromSelection();
    if (k === 'h') createMark(anchor, 'highlight', lastColor);
    else if (k === 'u') createMark(anchor, 'underline');
    else if (k === 's') createMark(anchor, 'strike');
    else createNote(anchor);
  });
  window.addEventListener('beforeunload', function (e) {
    if (window.MN.isDirty()) { e.preventDefault(); e.returnValue = ''; }
  });

  setSaveState(dirty ? 'dirty' : 'saved');
})();
</script>
</body>
</html>
